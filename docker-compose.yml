services:
  web_scraper_agent:
    build:
      context: .
    container_name: web_scraper_agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: >
      /bin/bash -c "
        echo 'Starting Xvfb...';
        Xvfb :99 -screen 0 1920x1080x24 & export DISPLAY=:99;
        sleep 2;
        echo 'Launching Playwright...';
        uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - DISPLAY=:99
